<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Inches ↔ Fractions ↔ mm" />
    <title>Inches ↔ Fractions ↔ mm</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg: #eef0f4;
        --header-bg: #1c2533;
        --card-bg: #ffffff;
        --accent: #2563eb;
        --text: #111827;
        --text-muted: #6b7280;
        --label-text: #374151;
        --border: #e5e7eb;
        --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 14px rgba(0,0,0,.06);
        --radius: 10px;
        --out-color: #0d9488;
      }

      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      header {
        background: var(--header-bg);
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.01em;
      }

      .page {
        padding: 20px 16px 48px;
        max-width: 560px;
        margin: 0 auto;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 24px 0 8px;
      }

      .section-label:first-child {
        margin-top: 0;
      }

      .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
      }

      .row:last-child {
        border-bottom: none;
      }

      .label {
        width: 148px;
        flex-shrink: 0;
        font-size: 14px;
        font-weight: 600;
        color: var(--label-text);
      }

      .field {
        flex: 1;
        min-width: 0;
      }

      input {
        width: 100%;
        font-size: 16px;
        padding: 6px 8px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        background: #fafafa;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: var(--accent);
        background: #fff;
      }

      .out {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 17px;
        font-weight: 600;
        color: var(--out-color);
        padding: 2px 0;
      }

      .hint {
        color: var(--text-muted);
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.5;
      }

      .frac-field {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .frac-input {
        width: auto;
        flex: 1;
        min-width: 0;
      }

      .frac-sep {
        font-size: 22px;
        color: var(--text-muted);
        line-height: 1;
        flex-shrink: 0;
      }

      @media (max-width: 480px) {
        .row {
          flex-direction: column;
          align-items: stretch;
          gap: 6px;
        }
        .label {
          width: auto;
          font-size: 12px;
          font-weight: 700;
          color: var(--text-muted);
        }
      }
    </style>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
  </head>
  <body>
    <header>
      <span style="font-size:20px">📐</span>
      <h1>Inch · Fraction · mm</h1>
    </header>

    <div class="page">

      <div class="section-label">Unit Converter</div>
      <div class="card">
        <div class="row">
          <div class="label">Decimal (in)</div>
          <div class="field">
            <input id="decimalIn" inputmode="decimal" placeholder="e.g. 6.425 or .425" />
          </div>
        </div>
        <div class="row">
          <div class="label">Metric (mm)</div>
          <div class="field">
            <input id="metricMm" inputmode="decimal" placeholder="e.g. 42" />
          </div>
        </div>
        <div class="row">
          <div class="label">Cut long (in)</div>
          <div class="field out" id="cutLong">—</div>
        </div>
        <div class="row">
          <div class="label">Stop short (in)</div>
          <div class="field out" id="stopShort">—</div>
        </div>
      </div>
      <div class="hint">Fractions use denominators: 2, 4, 8, 16, 32 (tape-friendly). mm shown to 3 decimals.</div>

      <div class="section-label">Fraction → Decimal</div>
      <div class="card">
        <div class="row">
          <div class="label">Fraction (in)</div>
          <div class="field frac-field">
            <input id="fracWhole" inputmode="decimal" placeholder="whole" class="frac-input" />
            <input id="fracNum" inputmode="decimal" placeholder="num" class="frac-input" />
            <span class="frac-sep">/</span>
            <input id="fracDen" inputmode="decimal" placeholder="den" class="frac-input" />
          </div>
        </div>
      </div>

      <div class="section-label">Board Feet</div>
      <div class="card">
        <div class="row">
          <div class="label">Thickness (in)</div>
          <div class="field">
            <input id="bfThick" inputmode="decimal" placeholder="e.g. 0.75" />
          </div>
        </div>
        <div class="row">
          <div class="label">Width (in)</div>
          <div class="field">
            <input id="bfWidth" inputmode="decimal" placeholder="e.g. 5.5" />
          </div>
        </div>
        <div class="row">
          <div class="label">Length (ft)</div>
          <div class="field">
            <input id="bfLength" inputmode="decimal" placeholder="e.g. 8" />
          </div>
        </div>
        <div class="row">
          <div class="label">Board feet</div>
          <div class="field out" id="bfResult">—</div>
        </div>
      </div>

    </div>

    <script src="./app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
        })
      }
    </script>
  </body>
</html>
